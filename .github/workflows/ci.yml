name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: |
          GOOS=linux GOARCH=amd64 go build -o agent-loop-linux-amd64 ./src/cmd/agent-loop

      - name: Test
        run: make test

      - name: Vet
        run: make vet

      - name: Fmt
        run: make fmt
